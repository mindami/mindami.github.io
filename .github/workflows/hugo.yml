name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DART_SASS_VERSION: 1.99.0
      GO_VERSION: 1.26.1
      NODE_VERSION: 24.14.1
      TZ: Europe/Oslo
      HUGO_ENVIRONMENT: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Load build settings from .env
        run: |
          set -a
          source .env
          set +a

          : "${HUGO_VERSION:=v0.161.1}"
          : "${SITE_URL:=}"

          HUGO_VERSION_NO_V="${HUGO_VERSION#v}"

          if [[ -z "${SITE_URL}" ]]; then
            echo "SITE_URL is required in .env" >&2
            exit 1
          fi

          case "${SITE_URL}" in
            */) ;;
            *) SITE_URL="${SITE_URL}/" ;;
          esac

          echo "HUGO_VERSION=${HUGO_VERSION}" >> "${GITHUB_ENV}"
          echo "HUGO_VERSION_NO_V=${HUGO_VERSION_NO_V}" >> "${GITHUB_ENV}"
          echo "SITE_URL=${SITE_URL}" >> "${GITHUB_ENV}"
          echo "Using Hugo ${HUGO_VERSION}"
          echo "Using SITE_URL ${SITE_URL}"

      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"

      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION_NO_V}/hugo_extended_${HUGO_VERSION_NO_V}_linux-amd64.tar.gz"
          mkdir "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION_NO_V}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION_NO_V}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"

      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Configure Git
        run: |
          git config core.quotepath false

      - name: Stage external JS/TS apps
        env:
          ZIEJAZZ_REPO_PAT: ${{ secrets.ZIEJAZZ_REPO_PAT }}
        run: |
          bash ./scripts/stage_external_apps.sh --config ./external-apps.conf --engine host

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: |
            hugo-

      - name: Build the site
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${SITE_URL}" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Ensure .nojekyll
        run: |
          touch ./public/.nojekyll

      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
