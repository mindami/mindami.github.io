<header class="site-header">
  <div class="container">
    <a href="{{ "/" | relURL }}" class="site-logo">
      Agentic<span>.</span>
    </a>
    <nav aria-label="Main navigation">
      <ul class="site-nav">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL | relURL }}"
             {{ if ($.IsMenuCurrent "main" .) }}class="active"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
