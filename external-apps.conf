# External app staging config
# Format (pipe-delimited):
# slug|repo|ref|install_cmd|build_cmd|output_dir|publish_subpath|auth
#
# Fields:
# - slug: unique short app id
# - repo: GitHub repo in owner/repo form, HTTPS URL, or SSH URL
# - ref: branch, tag, or commit-ish to clone
# - install_cmd: install command run in repo root
# - build_cmd: build command run in repo root
# - output_dir: path to build output directory (relative to repo root)
# - publish_subpath: relative destination under ./static
# - auth: none|pat
#
# For private GitHub repos with auth=pat, set ZIEJAZZ_REPO_PAT in the environment.

ziejazz|alee/ziejazz|main|npm ci|npm run build|dist|apps/ziejazz|pat
